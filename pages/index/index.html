<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>预测人生</title>
  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="index.css">
  <!-- 预加载关键图片 -->
  <link rel="preload" href="../../picture/背景图.jpg" as="image">
  <link rel="preload" href="../../picture/preimg.jpg" as="image">
  <link rel="preload" href="../../picture/首页图.jpg" as="image">
</head>
<body>
  <!-- 加载页 -->
  <div id="loading-container" class="container">
    <img src="../../picture/背景图.jpg" class="background">
    <div style="margin: auto;">
      <img class="logo" src="../../picture/preimg.jpg" alt="logo">
      <div class="load">
        <span class="sct"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <!-- 主页面 -->
  <div id="main-container" style="display: none;">
    <img class="img" src="../../picture/首页图.jpg" alt="首页" onload="onMainImgLoad()" onerror="onMainImgLoad()">
    <div class="topcenter">
      <span class="center-top-text">娱乐为主，结果仅供参考</span>
    </div>
    <button class="btn1" onclick="gototool()"></button>
    <button class="btn2" onclick="gotoinfo()"></button>
    <button class="btn3" onclick="gotomine()"></button>
  </div>

  <script src="../../js/common.js"></script>
  <script src="index.js"></script>
</body>
</html>
