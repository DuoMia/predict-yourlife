<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>精准测算</title>
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: linear-gradient(180deg, #f0f5ff 0%, #fff 100%);
      min-height: 100vh;
      padding: 60px 20px;
    }
    .title {
      text-align: center;
      font-size: 22px;
      color: #1890ff;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }
    .form-input:focus {
      border-color: #1890ff;
    }
    .type-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .type-btn {
      padding: 10px 20px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .type-btn.active {
      background: #1890ff;
      color: #fff;
      border-color: #1890ff;
    }
    .btn-calculate {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1890ff, #096dd9);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }
    .result-box {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .result-title {
      font-size: 20px;
      color: #1890ff;
      margin-bottom: 15px;
      text-align: center;
    }
    .result-item {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .result-label {
      font-size: 12px;
      color: #999;
    }
    .result-value {
      font-size: 16px;
      color: #333;
      margin-top: 5px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>
  
  <h2 class="title">🎯 精准测算</h2>
  
  <div class="form-group">
    <label class="form-label">选择测算类型</label>
    <div class="type-selector" id="type-selector">
      <button class="type-btn active" data-type="0" onclick="selectType(0)">出行求财</button>
      <button class="type-btn" data-type="1" onclick="selectType(1)">疾病康愈</button>
      <button class="type-btn" data-type="2" onclick="selectType(2)">失物寻找</button>
      <button class="type-btn" data-type="3" onclick="selectType(3)">吊宫修造</button>
    </div>
  </div>
  
  <div class="form-group">
    <label class="form-label">选择日期</label>
    <input type="date" class="form-input" id="date-input">
  </div>
  
  <div class="form-group">
    <label class="form-label">选择时辰</label>
    <select class="form-input" id="period-select">
      <option value="0">子时 (23:00-01:00)</option>
      <option value="1">丑时 (01:00-03:00)</option>
      <option value="2">寅时 (03:00-05:00)</option>
      <option value="3">卯时 (05:00-07:00)</option>
      <option value="4">辰时 (07:00-09:00)</option>
      <option value="5">巳时 (09:00-11:00)</option>
      <option value="6">午时 (11:00-13:00)</option>
      <option value="7">未时 (13:00-15:00)</option>
      <option value="8">申时 (15:00-17:00)</option>
      <option value="9">酉时 (17:00-19:00)</option>
      <option value="10">戌时 (19:00-21:00)</option>
      <option value="11">亥时 (21:00-23:00)</option>
    </select>
  </div>
  
  <button class="btn-calculate" onclick="calculate()">开始测算</button>
  
  <div id="result-box" class="result-box hidden">
    <div class="result-title" id="result-title"></div>
    <div class="result-item">
      <div class="result-label">测算时间</div>
      <div class="result-value" id="result-time"></div>
    </div>
    <div class="result-item">
      <div class="result-label">测算类型</div>
      <div class="result-value" id="result-type"></div>
    </div>
    <div class="result-item">
      <div class="result-label">运势结果</div>
      <div class="result-value" id="result-fortune"></div>
    </div>
    <div class="result-item">
      <div class="result-label">详细解读</div>
      <div class="result-value" id="result-detail"></div>
    </div>
  </div>

  <script src="../../js/common.js"></script>
  <script>
    var currentType = 0;
    var results = ['大安', '留连', '速喜', '赤口', '小吉', '空亡'];
    
    // 设置默认日期为今天
    document.getElementById('date-input').valueAsDate = new Date();
    
    function selectType(type) {
      currentType = type;
      var btns = document.querySelectorAll('.type-btn');
      btns.forEach(function(btn) {
        btn.classList.toggle('active', parseInt(btn.dataset.type) === type);
      });
    }
    
    function calculate() {
      var date = document.getElementById('date-input').value;
      var period = parseInt(document.getElementById('period-select').value);
      
      if (!date) {
        showToast('请选择日期');
        return;
      }
      
      // 计算运势
      var dateParts = date.split('-');
      var year = parseInt(dateParts[0]);
      var month = parseInt(dateParts[1]);
      var day = parseInt(dateParts[2]);
      
      // 六壬算法简化版
      var sum = year + month + day + period;
      var index = sum % 6;
      var result = results[index];
      
      // 显示结果
      document.getElementById('result-box').classList.remove('hidden');
      document.getElementById('result-title').textContent = result;
      document.getElementById('result-time').textContent = date + ' ' + getPeriodName(period);
      document.getElementById('result-type').textContent = typeNames[currentType];
      document.getElementById('result-fortune').textContent = resultData[result].info.substring(0, 50) + '...';
      document.getElementById('result-detail').textContent = getDetailInfo(result, currentType);
    }
    
    function getPeriodName(index) {
      var names = ['子时', '丑时', '寅时', '卯时', '辰时', '巳时', '午时', '未时', '申时', '酉时', '戌时', '亥时'];
      return names[index];
    }
  </script>
</body>
</html>
