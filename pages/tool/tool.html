<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>实用工具</title>
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: #f5f5f5;
      min-height: 100vh;
      padding: 60px 20px 80px;
    }
    .title {
      text-align: center;
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
    }
    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .tool-item {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .tool-icon {
      width: 50px;
      height: 50px;
      margin-right: 15px;
    }
    .tool-info h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }
    .tool-info p {
      font-size: 12px;
      color: #999;
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid #eee;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #666;
      font-size: 12px;
    }
    .nav-item.active {
      color: #07c160;
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>
  
  <h2 class="title">🛠️ 实用工具</h2>
  
  <div class="tool-list">
    <a href="../random/random.html" class="tool-item">
      <img src="../../pages/image/运势.png" alt="运势" class="tool-icon">
      <div class="tool-info">
        <h3>今日运势</h3>
        <p>测算今日吉凶祸福</p>
      </div>
    </a>
    <a href="../lottery/lottery.html" class="tool-item">
      <img src="../../pages/image/签筒.png" alt="抽签" class="tool-icon">
      <div class="tool-info">
        <h3>抽签解签</h3>
        <p>诚心求签问事</p>
      </div>
    </a>
    <a href="../datetime/datetime.html" class="tool-item">
      <img src="../../pages/image/八卦.png" alt="时辰" class="tool-icon">
      <div class="tool-info">
        <h3>时辰吉凶</h3>
        <p>查看各时辰运势</p>
      </div>
    </a>
    <a href="../test/test.html" class="tool-item">
      <img src="../../pages/image/工具.png" alt="测试" class="tool-icon">
      <div class="tool-info">
        <h3>精准测算</h3>
        <p>详细时间测算</p>
      </div>
    </a>
  </div>

  <nav class="nav-bar">
    <a href="../index/index.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </a>
    <a href="tool.html" class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
      <span>工具</span>
    </a>
    <a href="../mine/mine.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>我的</span>
    </a>
  </nav>

  <script src="../../js/common.js"></script>

</html>
