<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>签文</title>
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: linear-gradient(180deg, #fff8f0 0%, #fff 100%);
      min-height: 100vh;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .title {
      text-align: center;
      font-size: 22px;
      color: #8b4513;
      margin-bottom: 20px;
    }
    .sign-number {
      font-size: 24px;
      color: #d4a574;
      margin-bottom: 20px;
    }
    .sign-image {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .loading {
      color: #999;
      font-size: 16px;
    }
    .error-msg {
      color: #e74c3c;
      text-align: center;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>
  
  <h2 class="title">📜 签文</h2>
  <div class="sign-number" id="sign-number"></div>
  
  <div id="loading" class="loading">签文加载中...</div>
  <img id="sign-image" class="sign-image" style="display:none;" onload="onImageLoad()" onerror="onImageError()">
  <div id="error" class="error-msg" style="display:none;"></div>

  <script src="../../js/common.js"></script>
  <script>
    var signNumber = getUrlParam('sign') || 1;
    document.getElementById('sign-number').textContent = '第 ' + signNumber + ' 签';
    
    // 加载签文图片
    var img = document.getElementById('sign-image');
    img.src = '../../picture/签文/签' + signNumber + '.jpg';
    
    function onImageLoad() {
      document.getElementById('loading').style.display = 'none';
      img.style.display = 'block';
    }
    
    function onImageError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = '签文图片加载失败，请检查路径';
    }
  </script>
</body>
</html>
