<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>时辰吉凶</title>
  <link rel="stylesheet" href="../../css/common.css">
  <style>
    body {
      background: linear-gradient(180deg, #e6f7ff 0%, #fff 100%);
      min-height: 100vh;
      padding: 60px 20px;
    }
    .title {
      text-align: center;
      font-size: 22px;
      color: #1890ff;
      margin-bottom: 20px;
    }
    .current-time {
      text-align: center;
      font-size: 36px;
      color: #333;
      margin-bottom: 10px;
    }
    .current-period {
      text-align: center;
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }
    .period-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .period-item {
      background: #fff;
      border-radius: 8px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .period-item.active {
      background: #e6f7ff;
      border: 2px solid #1890ff;
    }
    .period-item.good {
      border-left: 3px solid #52c41a;
    }
    .period-item.bad {
      border-left: 3px solid #f5222d;
    }
    .period-name {
      font-size: 16px;
      color: #333;
      margin-bottom: 5px;
    }
    .period-time {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }
    .period-fortune {
      font-size: 14px;
      font-weight: bold;
    }
    .period-fortune.good {
      color: #52c41a;
    }
    .period-fortune.bad {
      color: #f5222d;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>
  
  <h2 class="title">⏰ 时辰吉凶</h2>
  <div class="current-time" id="current-time"></div>
  <div class="current-period" id="current-period"></div>
  
  <div class="period-list" id="period-list"></div>

  <script src="../../js/common.js"></script>
  <script>
    var periods = [
      { name: '子时', time: '23:00-01:00', fortune: ['大安', '留连', '速喜', '赤口', '小吉', '空亡'] },
      { name: '丑时', time: '01:00-03:00', fortune: ['留连', '速喜', '赤口', '小吉', '空亡', '大安'] },
      { name: '寅时', time: '03:00-05:00', fortune: ['速喜', '赤口', '小吉', '空亡', '大安', '留连'] },
      { name: '卯时', time: '05:00-07:00', fortune: ['赤口', '小吉', '空亡', '大安', '留连', '速喜'] },
      { name: '辰时', time: '07:00-09:00', fortune: ['小吉', '空亡', '大安', '留连', '速喜', '赤口'] },
      { name: '巳时', time: '09:00-11:00', fortune: ['空亡', '大安', '留连', '速喜', '赤口', '小吉'] },
      { name: '午时', time: '11:00-13:00', fortune: ['大安', '留连', '速喜', '赤口', '小吉', '空亡'] },
      { name: '未时', time: '13:00-15:00', fortune: ['留连', '速喜', '赤口', '小吉', '空亡', '大安'] },
      { name: '申时', time: '15:00-17:00', fortune: ['速喜', '赤口', '小吉', '空亡', '大安', '留连'] },
      { name: '酉时', time: '17:00-19:00', fortune: ['赤口', '小吉', '空亡', '大安', '留连', '速喜'] },
      { name: '戌时', time: '19:00-21:00', fortune: ['小吉', '空亡', '大安', '留连', '速喜', '赤口'] },
      { name: '亥时', time: '21:00-23:00', fortune: ['空亡', '大安', '留连', '速喜', '赤口', '小吉'] }
    ];
    
    var goodFortune = ['大安', '速喜', '小吉'];
    
    function updateTime() {
      var now = new Date();
      var hours = now.getHours();
      var minutes = now.getMinutes();
      var timeStr = (hours < 10 ? '0' : '') + hours + ':' + (minutes < 10 ? '0' : '') + minutes;
      document.getElementById('current-time').textContent = timeStr;
      
      // 计算当前时辰
      var periodIndex = Math.floor((hours + 1) / 2) % 12;
      var period = periods[periodIndex];
      document.getElementById('current-period').textContent = '当前时辰: ' + period.name + ' (' + period.time + ')';
      
      // 更新时辰列表
      renderPeriodList(periodIndex);
    }
    
    function renderPeriodList(activeIndex) {
      var list = document.getElementById('period-list');
      list.innerHTML = '';
      
      periods.forEach(function(p, i) {
        var fortune = p.fortune[0];
        var isGood = goodFortune.indexOf(fortune) !== -1;
        
        var div = document.createElement('div');
        div.className = 'period-item' + (i === activeIndex ? ' active' : '') + (isGood ? ' good' : ' bad');
        div.innerHTML = '<div class="period-name">' + p.name + '</div>' +
                        '<div class="period-time">' + p.time + '</div>' +
                        '<div class="period-fortune ' + (isGood ? 'good' : 'bad') + '">' + fortune + '</div>';
        list.appendChild(div);
      });
    }
    
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
